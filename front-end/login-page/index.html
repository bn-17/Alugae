<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Alugaaê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../login-page/style.css">
    <link rel="icon" href="../../assets/LOGO_ALUGAÊ-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="../config/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="login-container">
        <div class="box-login">
            <button class="voltar-homepage"><i class="bi bi-arrow-left"></i> Voltar para o início</button>
            <i class="bi bi-check-circle-fill"></i>
            
            <h6>Bem-vindo de volta</h6>
            <p>Insira suas credencias para acessar sua conta</p>

            <form class="form-login" id="formLogin">
                <label>E-mail</label>
                <i class="bi bi-envelope"></i>
                <input type="email" placeholder="seu@email.com" class="email" id="email">

                <label>Senha</label>
                <i class="bi bi-lock"></i>
                <a href="" class="resgatar-senha">Esqueceu a senha?</a> 
                <input type="password" placeholder="•••••••" class="senha" id="senha">
                <div id="eye-password""></div>
                                        
                

                <button type="submit">Entrar</button>
                
            </form>

            <div class="login-plataformas">
                <a href="" class="google"><i class="bi bi-google"></i></a>
                <a href="" class="apple"><i class="bi bi-apple"></i></a>
                <a href="" class="facebook"><i class="bi bi-facebook"></i></a>
            </div>

            <hr style="margin-top: 40px; max-width: 90%; margin-left: 30px; color: var(--colorTextCinza)">
            <p>Não tem uma conta? <a href="../page-registro/index.html">Cadastre-se</a></p>

            
        </div>
    </div>
<script>
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="script.js"></script>
</body>
</html>
