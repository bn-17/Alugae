<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar um item</title>

    <link rel="icon" href="../../assets/LOGO_ALUGAÊ-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../config/style.css">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Nunito+Sans:wght@200..1000&family=Open+Sans:wght@300..800&family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <script src="script.js" defer></script>
</head>

<body>
    <div class="container-anuncio">
        <div class="button-back">
            <a href="../homepage/index.html">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="agrupa-tudo">
            <div class="text-header">
                <h6>Anunciar um produto</h6>
                <p>Preencha os dados abaixo com o máximo de detalhes possível</p>
            </div>

            <form class="form-anuncio" enctype="multipart/form-data">
                <p>Fotos do Produto</p>

                <div class="container-upload">
                    <label for="foto" class="upload-placeholder">
                        <i class="bi bi-image icon-upload"></i>
                        <span class="text-upload">Adicionar Foto</span>
                    </label>
                    <input type="file" id="foto" name="foto" accept="image/*" class="hide-input">
                </div>

                <div class="nome-do-anuncio">
                    <label>Título do Anúncio</label>
                    <input 
                        type="text" 
                        class="input-titulo" 
                        name="titulo" 
                        placeholder="Ex: PlayStation 5 Pro"
                        required
                    >
                </div>

                <div class="select-custom">
                    <label for="categorias">Categorias</label>

                    <div class="select-selected">
                        Selecionar <i class="bi bi-arrow-down"></i>
                    </div>

                    <ul class="select-options">
                        <li data-value="5">Roupas</li>
                        <li data-value="6">Esportes</li>
                        <li data-value="7">Autos</li>
                        <li data-value="8">Video Games</li>
                        <li data-value="9">Imóveis</li>
                        <li data-value="10">Tecnologias</li>
                    </ul>

                    <input type="hidden" name="categoria">
                </div>

                <div class="container-preco">
                    <label>Preço por dia (R$)</label>
                    <input 
                        type="number" 
                        class="input-preco" 
                        name="preco" 
                        placeholder="0,00"
                        min="1"
                        step="0.01"
                        required
                    >
                </div>

                <div class="container-cep">
                    <label>CEP</label>
                    <input 
                        type="text" 
                        id="cep" 
                        name="cep" 
                        placeholder="00000-000"
                        maxlength="9"
                        required
                    >
                </div>

                <div id="endereco" class="hidden">
                    <p class="cep-main"></p>
                    <p class="cep-sub"></p>
                </div>

                <div class="container-descricao">
                    <label>Descrição</label>
                    <textarea 
                        class="area-caracteristicas" 
                        name="descricao"
                        placeholder="Descreva as características do produto"
                        required
                    ></textarea>
                </div>

                <div class="buttons-enter">
                    <button type="submit" class="button-anunciar">Anunciar</button>
                    <button type="button" class="button-cancel" onclick="window.location.href='../homepage/index.html'">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
